name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Fichiers obligatoires
      id: fichiers-obligatoires
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Fichiers obligatoires
        setup-command: ''
        command: pip install -r requirements.txt -q && pytest tests/test_auto_eval.py::TestFichiersObligatoires
          -v --tb=short
        timeout: 60
        max-score: 5
    - name: Tests scoring
      id: tests-scoring
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Tests scoring
        setup-command: ''
        command: pip install -r requirements.txt -q && pytest tests/test_scoring.py
          -v --tb=short
        timeout: 60
        max-score: 10
    - name: Tests RAG
      id: tests-rag
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Tests RAG
        setup-command: ''
        command: pip install -r requirements.txt -q && pytest tests/test_rag.py -v
          --tb=short
        timeout: 60
        max-score: 10
    - name: API démarre
      id: api-demarre
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: API démarre
        setup-command: ''
        command: pip install -r requirements.txt -q && pytest tests/test_auto_eval.py::TestAPIDemarre
          -v --tb=short
        timeout: 60
        max-score: 5
    - name: URL déployée
      id: url-deployee
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: URL déployée
        setup-command: ''
        command: bash .github/scripts/check_deployment.sh
        timeout: 30
        max-score: 3
    - name: Git hygiene
      id: git-hygiene
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Git hygiene
        setup-command: ''
        command: bash .github/scripts/check_prs.sh
        timeout: 30
        max-score: 5
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        FICHIERS-OBLIGATOIRES_RESULTS: "${{steps.fichiers-obligatoires.outputs.result}}"
        TESTS-SCORING_RESULTS: "${{steps.tests-scoring.outputs.result}}"
        TESTS-RAG_RESULTS: "${{steps.tests-rag.outputs.result}}"
        API-DEMARRE_RESULTS: "${{steps.api-demarre.outputs.result}}"
        URL-DEPLOYEE_RESULTS: "${{steps.url-deployee.outputs.result}}"
        GIT-HYGIENE_RESULTS: "${{steps.git-hygiene.outputs.result}}"
      with:
        runners: fichiers-obligatoires,tests-scoring,tests-rag,api-demarre,url-deployee,git-hygiene
